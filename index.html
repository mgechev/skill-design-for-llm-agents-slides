        <div class="slide-content header-layout">
          <h2 class="slide-header">Common agent architectures</h2>
          <ul class="bullet-list">
            <li><strong>ReAct</strong> (Reason + Act) - agent loops between thought generation, action, and observation
              until the goal is met.</li>
            <li><strong>Plan-and-Execute</strong> - agent creates a full, multi-step plan upfront and adjusts it while
              executing each task.</li>
            <li><strong>Reflexion</strong> (Self-Correction) - agent evaluates its performance post-task, using internal
              feedback to improve future attempts.</li>
            <li><strong>State Machine-Based Agents</strong> - agent's reasoning and tool use are strictly confined by a
              predefined flowchart, ensuring reliable execution.</li>
            <li><strong>Hybrid</strong> - popular agents often include a mixture of the architectures from above</li>
          </ul>
        </div>
        <footer class="slide-footer"><span class="footer-left">AI Coding Summit</span><span
            class="footer-center">July</span><span class="footer-right">2026</span></footer>
      </template>

          <div class="code-body">

<span class="line hl">context := user_prompt + system_instructions</span>
<span class="line"></span>
<span class="line">while true {</span>
<span class="line">    tools := get_available_tools()</span>
<span class="line">    response := ask_llm_what_to_do(tools, context)</span>
<span class="line"></span>
<span class="line">    if response.done {</span>
<span class="line">        break</span>
<span class="line">    }</span>
<span class="line"></span>
<span class="line">    if response.tool_calls {</span>
<span class="line">        result := call_tools(response.tool_calls)</span>
<span class="line">    }</span>
<span class="line"></span>
<span class="line">    context := context + result</span>
<span class="line">}</span></pre>

    <div class="timeline-progress" id="progress-bar"></div>
  </div>

  <script src="app.js"></script>
  <script>
    (function () {
      // ── Syntax highlighting ──
      const KW = /\b(while|if|true|false|break)\b/g;
      const FN = /\b([a-z_]\w*)\s*(?=\()/g;
      const OP = /(:=|\+)/g;
      const STR = /("[^"]*")/g;

      function esc(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      function hi(raw) {
        let s = esc(raw);
        s = s.replace(STR, '<span style="color:#7dcfff">$1</span>');
        s = s.replace(KW, '<span style="color:#e0af68">$1</span>');
        s = s.replace(FN, '<span style="color:#7aa2f7">$1</span>');
        s = s.replace(OP, '<span style="color:#565f89">$1</span>');
        return s;
      }
      document.querySelectorAll('.slide').forEach(slide => {
        const root = slide.shadowRoot || slide;
        root.querySelectorAll('.code-block .line').forEach(el => {
          el.innerHTML = hi(el.textContent);
        });
      });

      // ── Align code-desc with highlighted lines (Shadow-piercing & Scale-aware) ──
      function positionBodyDesc(body) {
        const block = body.querySelector('.code-block');
        if (!block) return;
        let descEl = null;
        for (const c of body.children) {
          if (c !== block) { descEl = c; break; }
        }
        if (!descEl) return;

        const hls = block.querySelectorAll('.line.hl');
        if (!hls.length) {
          descEl.style.alignSelf = 'center';
          descEl.style.marginTop = '0';
          return;
        }

        const bodyRect = body.getBoundingClientRect();
        if (bodyRect.height === 0 || body.offsetHeight === 0) return;

        // Scale factor is viewport height divided by offsetHeight (CSS layout pixels)
        const scale = bodyRect.height / body.offsetHeight;

        const firstRect = hls[0].getBoundingClientRect();
        const lastRect = hls[hls.length - 1].getBoundingClientRect();

        // Calculate vertical center of highlighted lines relative to body in viewport pixels
        const hlCenterScaled = (firstRect.top + lastRect.bottom) / 2 - bodyRect.top;

        // Convert to unscaled layout pixels
        const hlCenter = hlCenterScaled / scale;

        // Centering calculation in CSS layout pixels
        const mt = Math.max(0, hlCenter - descEl.offsetHeight / 2);

        descEl.style.alignSelf = 'start';
        descEl.style.marginTop = mt + 'px';
      }

      // Observe resizing and visibility of all .code-body elements
      const resizeObs = new ResizeObserver(entries => {
        for (const entry of entries) {
          const body = entry.target;
          if (body.offsetHeight > 0) {
            positionBodyDesc(body);
          }
        }
      });

      document.querySelectorAll('.slide').forEach(slide => {
        const root = slide.shadowRoot || slide;
        root.querySelectorAll('.code-body').forEach(body => {
          resizeObs.observe(body);
        });
      });

      // Re-run alignment for active slide on window resize
      window.addEventListener('resize', () => {
        const active = document.querySelector('.slide.active');
        if (!active) return;
        const root = active.shadowRoot || active;
        root.querySelectorAll('.code-body').forEach(body => {
          if (body.offsetHeight > 0) {
            positionBodyDesc(body);
          }
        });
      });
    })();
  </script>
</body>

</html>
